services:
  expo:
    build: .
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - EXPO_NO_TYPESCRIPT_SETUP=1
      - REACT_NATIVE_PACKAGER_HOSTNAME=10.89.89.240
      - EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}
      - EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}
      - EXPO_PUBLIC_SUPABASE_STORAGE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_STORAGE_ANON_KEY}
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app # tout le projet (y compris package-lock.json quand il sera créé)
      - /app/node_modules # node_modules isolé dans un volume
      - ~/.expo:/root/.expo
    stdin_open: true
    tty: true
    restart: unless-stopped
